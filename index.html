<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MerkaFast - Tu tienda rápida</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #ff6b00;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .cart-icon {
            font-size: 1.5rem;
            cursor: pointer;
            background: white;
            color: #ff6b00;
            padding: 0.5rem 1rem;
            border-radius: 25px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .product-card h3 {
            margin: 0.5rem 0;
        }

        .price {
            color: #ff6b00;
            font-size: 1.25rem;
            font-weight: bold;
        }

        button {
            background: #ff6b00;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #e05a00;
        }

        .admin-panel {
            background: white;
            margin: 2rem;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .admin-panel h2 {
            color: #ff6b00;
            margin-bottom: 1rem;
        }

        #pedidos-lista {
            margin-top: 1rem;
        }

        .pedido-item {
            border-bottom: 1px solid #ddd;
            padding: 0.5rem;
            font-size: 0.9rem;
        }

        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 5px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 1000;
            padding: 1rem;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-sidebar h3 {
            margin-bottom: 1rem;
        }

        .close-cart {
            float: right;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-item {
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            background: #f9f9f9;
            border-radius: 5px;
        }

        .total {
            font-weight: bold;
            margin-top: 1rem;
        }

        .send-order {
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">MerkaFast 🚀</div>
    <div class="cart-icon" onclick="toggleCart()">🛒 Carrito (<span id="cart-count">0</span>)</div>
</header>

<div class="products" id="products">
    <div class="product-card">
        <h3>Producto 1</h3>
        <p>Descripción breve</p>
        <div class="price">$10.00</div>
        <button onclick="addToCart('Producto 1', 10)">Añadir</button>
    </div>
    <div class="product-card">
        <h3>Producto 2</h3>
        <p>Descripción breve</p>
        <div class="price">$15.00</div>
        <button onclick="addToCart('Producto 2', 15)">Añadir</button>
    </div>
    <div class="product-card">
        <h3>Producto 3</h3>
        <p>Descripción breve</p>
        <div class="price">$20.00</div>
        <button onclick="addToCart('Producto 3', 20)">Añadir</button>
    </div>
</div>

<div class="admin-panel">
    <h2>📊 Panel MerkaFast</h2>
    <p>Pedidos recibidos hoy: <strong id="pedidos-hoy">0</strong></p>
    <button onclick="cargarPedidos()">🔄 Actualizar pedidos</button>
    <div id="pedidos-lista"></div>
</div>

<div class="cart-sidebar" id="cart-sidebar">
    <span class="close-cart" onclick="toggleCart()">✖</span>
    <h3>Tu Carrito</h3>
    <div id="cart-items"></div>
    <div class="total">Total: $<span id="cart-total">0</span></div>
    <button class="send-order" onclick="enviarPedido()">✅ Confirmar Pedido</button>
</div>

<script>
    let carrito = [];

    function addToCart(nombre, precio) {
        carrito.push({ nombre, precio });
        actualizarCarritoUI();
    }

    function actualizarCarritoUI() {
        const cartItemsDiv = document.getElementById('cart-items');
        const cartTotalSpan = document.getElementById('cart-total');
        const cartCountSpan = document.getElementById('cart-count');

        cartItemsDiv.innerHTML = '';
        let total = 0;
        carrito.forEach((item, index) => {
            total += item.precio;
            cartItemsDiv.innerHTML += `
                <div class="cart-item">
                    ${item.nombre} - $${item.precio}
                    <button onclick="eliminarDelCarrito(${index})">❌</button>
                </div>
            `;
        });
        cartTotalSpan.innerText = total;
        cartCountSpan.innerText = carrito.length;
    }

    function eliminarDelCarrito(index) {
        carrito.splice(index, 1);
        actualizarCarritoUI();
    }

    function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('open');
    }

    // ⭐⭐⭐ TU URL DE SHEET.BEST (ya la pongo yo por ti) ⭐⭐⭐
    const SHEET_BEST_URL = "https://api.sheetbest.com/sheets/48b1d4bd-0caf-4bd0-ad2e-27b193cee506";

    function enviarPedido() {
        if (carrito.length === 0) {
            alert("🛒 Tu carrito está vacío");
            return;
        }

        const pedido = {
            fecha: new Date().toLocaleString(),
            total: carrito.reduce((sum, item) => sum + item.precio, 0),
            productos: JSON.stringify(carrito),
            items: carrito.length
        };

        fetch(SHEET_BEST_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pedido)
        })
        .then(response => {
            if (response.ok) {
                alert("✅ ¡Pedido enviado con éxito! Revisa tu Google Sheets.");
                carrito = [];
                actualizarCarritoUI();
                toggleCart();
                cargarPedidos();
            } else {
                alert("⚠️ Error al enviar. Revisa la URL de sheet.best");
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("❌ No se pudo conectar. Revisa tu conexión o la URL.");
        });
    }

    function cargarPedidos() {
        fetch(SHEET_BEST_URL)
        .then(response => response.json())
        .then(data => {
            const pedidosDiv = document.getElementById('pedidos-lista');
            const hoyDiv = document.getElementById('pedidos-hoy');
            
            if (!data || data.length === 0) {
                pedidosDiv.innerHTML = "<p>No hay pedidos aún</p>";
                hoyDiv.innerText = "0";
                return;
            }

            pedidosDiv.innerHTML = "<h3>Últimos pedidos:</h3>";
            data.slice(-10).reverse().forEach(pedido => {
                pedidosDiv.innerHTML += `
                    <div class="pedido-item">
                        📅 ${pedido.fecha} | 🛍️ ${pedido.items} productos | 💰 $${pedido.total}
                    </div>
                `;
            });

            const hoy = new Date().toLocaleDateString();
            const pedidosHoy = data.filter(p => p.fecha && p.fecha.startsWith(hoy)).length;
            hoyDiv.innerText = pedidosHoy;
        })
        .catch(error => {
            console.error("Error cargando pedidos:", error);
            document.getElementById('pedidos-lista').innerHTML = "<p>Error al cargar pedidos</p>";
        });
    }

    cargarPedidos();
</script>
</body>
</html>
